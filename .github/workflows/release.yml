# CLI 二进制与 Python SDK 发布；同 tag 下桌面端 dmg/msi/AppImage 由 release-desktop.yml 构建并追加到同一 Release
name: Build and Release SkillLite

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # Linux x86_64
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact_name: skilllite
            asset_name: skilllite-linux-x64

          # macOS x86_64 (Intel)
          - os: macos-15-intel
            target: x86_64-apple-darwin
            artifact_name: skilllite
            asset_name: skilllite-darwin-x64

          # macOS ARM64 (Apple Silicon)
          - os: macos-latest
            target: aarch64-apple-darwin
            artifact_name: skilllite
            asset_name: skilllite-darwin-arm64

          # Linux ARM64
          - os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            artifact_name: skilllite
            asset_name: skilllite-linux-arm64

          # Windows x86_64
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact_name: skilllite.exe
            asset_name: skilllite-windows-x64

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: ~/.cargo/registry
          key: ${{ runner.os }}-cargo-registry-${{ hashFiles('**/Cargo.lock') }}

      - name: Cache cargo index
        uses: actions/cache@v4
        with:
          path: ~/.cargo/git
          key: ${{ runner.os }}-cargo-index-${{ hashFiles('**/Cargo.lock') }}

      - name: Cache cargo build
        uses: actions/cache@v4
        with:
          path: target
          key: ${{ runner.os }}-${{ matrix.target }}-cargo-build-${{ hashFiles('Cargo.lock', 'skilllite/Cargo.toml') }}

      - name: Install cross-compilation tools (Linux ARM64)
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu

      - name: Verify Cargo.lock (required for rustls, no OpenSSL)
        shell: bash
        run: |
          test -f Cargo.lock || { echo "ERROR: Cargo.lock missing - ensure Cargo.lock is committed"; exit 1; }
          if grep -q openssl Cargo.lock; then
            echo "ERROR: Cargo.lock contains openssl (breaks aarch64 cross-compile). All reqwest deps must use default-features = false and rustls-tls."
            echo "Fix: ensure all reqwest deps use default-features = false and rustls-tls; from repo root run 'cargo build -p skilllite' and commit the root Cargo.lock."
            exit 1
          fi
          echo "Cargo.lock OK (no OpenSSL)"

      - name: Build skilllite (full)
        working-directory: ./skilllite
        run: cargo build --release --locked --bin skilllite --target ${{ matrix.target }}
        env:
          CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER: aarch64-linux-gnu-gcc

      - name: Build skilllite-sandbox (sandbox + MCP only)
        working-directory: ./skilllite
        run: cargo build --release --locked --bin skilllite-sandbox --no-default-features --features sandbox_binary --target ${{ matrix.target }}
        env:
          CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER: aarch64-linux-gnu-gcc

      - name: Create tarballs (Unix)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          cd target/${{ matrix.target }}/release
          tar -czf ${{ matrix.asset_name }}.tar.gz ${{ matrix.artifact_name }}
          tar -czf ${{ matrix.asset_name }}-sandbox.tar.gz skilllite-sandbox
          mv *.tar.gz ../../../

      - name: Create zips (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          cd target/${{ matrix.target }}/release
          Compress-Archive -Path ${{ matrix.artifact_name }} -DestinationPath ${{ matrix.asset_name }}.zip
          Compress-Archive -Path skilllite-sandbox.exe -DestinationPath ${{ matrix.asset_name }}-sandbox.zip
          Move-Item *.zip ../../../

      - name: Upload skilllite artifact (Unix)
        if: runner.os != 'Windows'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset_name }}
          path: ${{ matrix.asset_name }}.tar.gz

      - name: Upload skilllite-sandbox artifact (Unix)
        if: runner.os != 'Windows'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset_name }}-sandbox
          path: ${{ matrix.asset_name }}-sandbox.tar.gz

      - name: Upload skilllite artifact (Windows)
        if: runner.os == 'Windows'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset_name }}
          path: ${{ matrix.asset_name }}.zip

      - name: Upload skilllite-sandbox artifact (Windows)
        if: runner.os == 'Windows'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset_name }}-sandbox
          path: ${{ matrix.asset_name }}-sandbox.zip

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    if: always() && startsWith(github.ref, 'refs/tags/') && !cancelled() && needs.build.result == 'success'
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v8
        with:
          path: ./artifacts

      - name: Display structure of downloaded files
        run: ls -R ./artifacts || echo "No artifacts found"

      - name: Create Release
        id: create_release
        uses: softprops/action-gh-release@v2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          draft: false
          prerelease: false
          generate_release_notes: true
          fail_on_unmatched_files: false
          files: |
            ./artifacts/skilllite-linux-x64/skilllite-linux-x64.tar.gz
            ./artifacts/skilllite-linux-x64-sandbox/skilllite-linux-x64-sandbox.tar.gz
            ./artifacts/skilllite-darwin-x64/skilllite-darwin-x64.tar.gz
            ./artifacts/skilllite-darwin-x64-sandbox/skilllite-darwin-x64-sandbox.tar.gz
            ./artifacts/skilllite-darwin-arm64/skilllite-darwin-arm64.tar.gz
            ./artifacts/skilllite-darwin-arm64-sandbox/skilllite-darwin-arm64-sandbox.tar.gz
            ./artifacts/skilllite-linux-arm64/skilllite-linux-arm64.tar.gz
            ./artifacts/skilllite-linux-arm64-sandbox/skilllite-linux-arm64-sandbox.tar.gz
            ./artifacts/skilllite-windows-x64/skilllite-windows-x64.zip
            ./artifacts/skilllite-windows-x64-sandbox/skilllite-windows-x64-sandbox.zip

  # 各平台打带二进制的 wheel，供 PyPI 发布
  build-pypi-wheels:
    name: Wheel ${{ matrix.asset_name }}
    needs: build
    if: always() && startsWith(github.ref, 'refs/tags/') && !cancelled() && needs.build.result == 'success'
    strategy:
      fail-fast: false
      matrix:
        include:
          - asset_name: skilllite-linux-x64
            runs_on: ubuntu-latest
            archive: skilllite-linux-x64.tar.gz
            binary_name: skilllite
            plat_tag: manylinux_2_17_x86_64
          - asset_name: skilllite-darwin-x64
            runs_on: macos-15-intel
            archive: skilllite-darwin-x64.tar.gz
            binary_name: skilllite
            plat_tag: macosx_11_0_x86_64
          - asset_name: skilllite-darwin-arm64
            runs_on: macos-latest
            archive: skilllite-darwin-arm64.tar.gz
            binary_name: skilllite
            plat_tag: macosx_11_0_arm64
          - asset_name: skilllite-windows-x64
            runs_on: windows-latest
            archive: skilllite-windows-x64.zip
            binary_name: skilllite.exe
            plat_tag: win_amd64

    runs-on: ${{ matrix.runs_on }}

    env:
      VERSION: ${{ github.ref_name }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set version from tag
        run: python scripts/set_pyproject_version.py

      - name: Download binary artifact
        uses: actions/download-artifact@v8
        with:
          name: ${{ matrix.asset_name }}

      - name: Prepare binary (Unix)
        if: matrix.binary_name == 'skilllite'
        shell: bash
        run: |
          mkdir -p python-sdk/skilllite/bins
          # v4: single-artifact may extract to cwd; older or multi-file may use artifact-name subdir
          if [ -f "${{ matrix.archive }}" ]; then
            tar -xzf "${{ matrix.archive }}" -C python-sdk/skilllite/bins
          else
            tar -xzf "${{ matrix.asset_name }}/${{ matrix.archive }}" -C python-sdk/skilllite/bins
          fi
          chmod +x python-sdk/skilllite/bins/${{ matrix.binary_name }}

      - name: Prepare binary (Windows)
        if: matrix.binary_name == 'skilllite.exe'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path python-sdk/skilllite/bins
          $arch = "${{ matrix.archive }}"
          if (-not (Test-Path $arch)) { $arch = "${{ matrix.asset_name }}/${{ matrix.archive }}" }
          Expand-Archive -Path $arch -DestinationPath python-sdk/skilllite/bins

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install build deps and build wheel
        run: |
          python -m pip install --upgrade pip build wheel
          cd python-sdk && python -m build --wheel
          python ../scripts/retag_wheel.py dist ${{ matrix.plat_tag }}

      - name: Upload wheel artifact
        uses: actions/upload-artifact@v4
        with:
          name: pypi-wheel-${{ matrix.asset_name }}
          path: python-sdk/dist/*.whl

  publish-pypi:
    name: Publish to PyPI
    needs: [release, build-pypi-wheels]
    runs-on: ubuntu-latest
    if: always() && startsWith(github.ref, 'refs/tags/') && needs.release.result == 'success' && needs.build-pypi-wheels.result == 'success'

    env:
      VERSION: ${{ github.ref_name }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set version from tag
        run: python scripts/set_pyproject_version.py

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install build dependencies
        run: |
          python -m pip install --upgrade pip
          pip install build twine

      - name: Build sdist (no binary)
        working-directory: ./python-sdk
        run: python -m build --sdist

      - name: Download all wheel artifacts
        uses: actions/download-artifact@v8
        with:
          pattern: pypi-wheel-*
          path: wheel-artifacts
          merge-multiple: false

      - name: Merge wheels into dist
        run: |
          mkdir -p python-sdk/dist
          find wheel-artifacts -name '*.whl' -exec cp {} python-sdk/dist/ \;

      - name: Verify dist (4 wheels + 1 sdist)
        run: |
          n_whl=$(find python-sdk/dist -name '*.whl' | wc -l)
          n_sdist=$(find python-sdk/dist -name '*.tar.gz' | wc -l)
          if [ "$n_whl" -ne 4 ] || [ "$n_sdist" -ne 1 ]; then
            echo "Expected 4 wheels and 1 sdist, got $n_whl wheels and $n_sdist sdist"
            ls -la python-sdk/dist/
            exit 1
          fi

      - name: Publish to PyPI
        working-directory: ./python-sdk
        env:
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ secrets.PYPI_API_TOKEN }}
        run: twine upload dist/*

